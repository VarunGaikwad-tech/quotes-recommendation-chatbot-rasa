<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0f1117" rx="16"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="54" x2="700" y2="54" stroke="#334155" stroke-width="1"/>

  <!-- USER -->
  <rect x="30" y="200" width="120" height="70" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="228" text-anchor="middle" fill="#93c5fd" font-size="22">👤</text>
  <text x="90" y="252" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">User</text>
  <text x="90" y="268" text-anchor="middle" fill="#64748b" font-size="10">Browser</text>

  <!-- Arrow User → Web UI -->
  <line x1="150" y1="235" x2="210" y2="235" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="180" y="225" text-anchor="middle" fill="#64748b" font-size="9">HTTP</text>

  <!-- WEB UI (Flask) -->
  <rect x="210" y="185" width="140" height="100" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="280" y="220" text-anchor="middle" fill="#a5b4fc" font-size="22">🌐</text>
  <text x="280" y="245" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Web Interface</text>
  <text x="280" y="261" text-anchor="middle" fill="#64748b" font-size="10">Flask App (port 5000)</text>
  <text x="280" y="275" text-anchor="middle" fill="#64748b" font-size="10">index.html + app.py</text>

  <!-- Arrow Web UI → Rasa Server -->
  <line x1="350" y1="235" x2="420" y2="235" stroke="#6366f1" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="385" y="225" text-anchor="middle" fill="#64748b" font-size="9">REST API</text>

  <!-- RASA SERVER -->
  <rect x="420" y="165" width="160" height="140" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="500" y="198" text-anchor="middle" fill="#c4b5fd" font-size="22">🤖</text>
  <text x="500" y="222" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Rasa NLU Server</text>
  <text x="500" y="240" text-anchor="middle" fill="#64748b" font-size="10">port 5005</text>
  <line x1="435" y1="250" x2="565" y2="250" stroke="#334155" stroke-width="1"/>
  <text x="500" y="265" text-anchor="middle" fill="#94a3b8" font-size="10">• Intent Recognition</text>
  <text x="500" y="280" text-anchor="middle" fill="#94a3b8" font-size="10">• Entity Extraction</text>
  <text x="500" y="295" text-anchor="middle" fill="#94a3b8" font-size="10">• NLP Pipeline</text>

  <!-- Arrow Rasa → Actions Server -->
  <line x1="580" y1="235" x2="650" y2="235" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-violet)"/>
  <text x="615" y="225" text-anchor="middle" fill="#64748b" font-size="9">Custom</text>
  <text x="615" y="218" text-anchor="middle" fill="#64748b" font-size="9">Actions</text>

  <!-- ACTIONS SERVER -->
  <rect x="650" y="185" width="140" height="100" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="720" y="220" text-anchor="middle" fill="#6ee7b7" font-size="22">⚙️</text>
  <text x="720" y="245" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Actions Server</text>
  <text x="720" y="261" text-anchor="middle" fill="#64748b" font-size="10">actions.py</text>
  <text x="720" y="275" text-anchor="middle" fill="#64748b" font-size="10">Quote Logic</text>

  <!-- Arrow Actions → Quotes DB -->
  <line x1="720" y1="285" x2="720" y2="345" stroke="#10b981" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- QUOTES DB -->
  <rect x="650" y="345" width="140" height="75" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="720" y="372" text-anchor="middle" fill="#fde68a" font-size="20">📚</text>
  <text x="720" y="393" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Quotes Store</text>
  <text x="720" y="408" text-anchor="middle" fill="#64748b" font-size="10">domain.yml</text>

  <!-- Trained Model -->
  <rect x="420" y="360" width="160" height="75" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="500" y="387" text-anchor="middle" fill="#f9a8d4" font-size="20">🧠</text>
  <text x="500" y="408" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Trained Model</text>
  <text x="500" y="422" text-anchor="middle" fill="#64748b" font-size="10">nlu.yml · stories.yml</text>

  <!-- Arrow Model → Rasa -->
  <line x1="500" y1="360" x2="500" y2="305" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-pink)"/>

  <!-- TRAINING DATA -->
  <rect x="200" y="360" width="160" height="75" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="280" y="387" text-anchor="middle" fill="#fdba74" font-size="20">📝</text>
  <text x="280" y="408" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Training Data</text>
  <text x="280" y="422" text-anchor="middle" fill="#64748b" font-size="10">nlu.yml · rules.yml</text>

  <!-- Arrow Training Data → Model -->
  <line x1="360" y1="397" x2="420" y2="397" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-orange)"/>

  <!-- Legend -->
  <rect x="30" y="420" width="340" height="70" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="50" y="440" fill="#64748b" font-size="11" font-weight="600">LEGEND</text>
  <line x1="50" y1="455" x2="80" y2="455" stroke="#3b82f6" stroke-width="2"/>
  <text x="88" y="459" fill="#94a3b8" font-size="10">Live request/response flow</text>
  <line x1="50" y1="472" x2="80" y2="472" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="88" y="476" fill="#94a3b8" font-size="10">Model loading (at startup)</text>
  <line x1="185" y1="455" x2="215" y2="455" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="223" y="459" fill="#94a3b8" font-size="10">Training pipeline</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ec4899"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
</svg>
