<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="user-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="flask-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="rasa-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#0d6460"/>
    </linearGradient>
    <linearGradient id="action-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arr-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bg)" rx="20"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1000" height="64" rx="20" fill="#0d1117"/>
  <rect x="0" y="44" width="1000" height="20" fill="#0d1117"/>
  <text x="500" y="40" text-anchor="middle" fill="#f9fafb" font-size="19" font-weight="700" letter-spacing="4">SYSTEM ARCHITECTURE</text>
  <line x1="300" y1="54" x2="700" y2="54" stroke="#374151" stroke-width="1.5"/>

  <!-- ─── NODE 1 : User ─── -->
  <g filter="url(#shadow)">
    <rect x="50" y="195" width="148" height="138" rx="14" fill="url(#user-g)"/>
  </g>
  <rect x="50" y="195" width="148" height="138" rx="14" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="124" y="243" text-anchor="middle" font-size="30">👤</text>
  <text x="124" y="270" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">User</text>
  <line x1="70" y1="280" x2="178" y2="280" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>
  <text x="124" y="297" text-anchor="middle" fill="#bfdbfe" font-size="11">Web Browser</text>
  <text x="124" y="314" text-anchor="middle" fill="#93c5fd" font-size="10">localhost:5000</text>

  <!-- Arrow 1 → 2 -->
  <line x1="200" y1="264" x2="268" y2="264" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="234" y="255" text-anchor="middle" fill="#9ca3af" font-size="10">HTTP</text>

  <!-- ─── NODE 2 : Flask ─── -->
  <g filter="url(#shadow)">
    <rect x="270" y="195" width="160" height="138" rx="14" fill="url(#flask-g)"/>
  </g>
  <rect x="270" y="195" width="160" height="138" rx="14" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="350" y="243" text-anchor="middle" font-size="30">🌐</text>
  <text x="350" y="270" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Flask Web App</text>
  <line x1="290" y1="280" x2="410" y2="280" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
  <text x="350" y="297" text-anchor="middle" fill="#ddd6fe" font-size="11">app.py</text>
  <text x="350" y="314" text-anchor="middle" fill="#c4b5fd" font-size="10">index.html</text>

  <!-- Arrow 2 → 3 -->
  <line x1="432" y1="264" x2="498" y2="264" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="252" text-anchor="middle" fill="#9ca3af" font-size="10">REST API</text>
  <text x="465" y="263" text-anchor="middle" fill="#9ca3af" font-size="10">POST</text>

  <!-- ─── NODE 3 : Rasa NLU (larger, centre) ─── -->
  <g filter="url(#shadow)">
    <rect x="500" y="168" width="190" height="192" rx="14" fill="url(#rasa-g)"/>
  </g>
  <rect x="500" y="168" width="190" height="192" rx="14" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="595" y="214" text-anchor="middle" font-size="30">🤖</text>
  <text x="595" y="244" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Rasa NLU Server</text>
  <text x="595" y="261" text-anchor="middle" fill="#99f6e4" font-size="11">Port 5005</text>
  <line x1="520" y1="272" x2="670" y2="272" stroke="#0f766e" stroke-width="1" opacity="0.6"/>
  <text x="595" y="290" text-anchor="middle" fill="#ccfbf1" font-size="11">• Intent Recognition</text>
  <text x="595" y="308" text-anchor="middle" fill="#ccfbf1" font-size="11">• Entity Extraction</text>
  <text x="595" y="326" text-anchor="middle" fill="#ccfbf1" font-size="11">• NLP Pipeline</text>
  <text x="595" y="344" text-anchor="middle" fill="#ccfbf1" font-size="11">• Dialogue Management</text>

  <!-- Arrow 3 → 4 -->
  <line x1="692" y1="264" x2="758" y2="264" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="725" y="252" text-anchor="middle" fill="#9ca3af" font-size="10">Custom</text>
  <text x="725" y="263" text-anchor="middle" fill="#9ca3af" font-size="10">Action</text>

  <!-- ─── NODE 4 : Actions Server ─── -->
  <g filter="url(#shadow)">
    <rect x="760" y="195" width="160" height="138" rx="14" fill="url(#action-g)"/>
  </g>
  <rect x="760" y="195" width="160" height="138" rx="14" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="840" y="243" text-anchor="middle" font-size="30">⚙️</text>
  <text x="840" y="270" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Actions Server</text>
  <line x1="780" y1="280" x2="900" y2="280" stroke="#92400e" stroke-width="1" opacity="0.5"/>
  <text x="840" y="297" text-anchor="middle" fill="#fde68a" font-size="11">actions.py</text>
  <text x="840" y="314" text-anchor="middle" fill="#fcd34d" font-size="10">Quote Retrieval</text>

  <!-- Arrow Actions ↓ Quotes Store -->
  <line x1="840" y1="335" x2="840" y2="400" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="858" y="370" fill="#9ca3af" font-size="10">fetch</text>

  <!-- ─── NODE 5 : Quotes Store ─── -->
  <g filter="url(#shadow)">
    <rect x="760" y="402" width="160" height="110" rx="14" fill="#1c1f2e"/>
  </g>
  <rect x="760" y="402" width="160" height="110" rx="14" fill="none" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="840" y="444" text-anchor="middle" font-size="28">📚</text>
  <text x="840" y="470" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Quotes Store</text>
  <text x="840" y="488" text-anchor="middle" fill="#fda4af" font-size="10">domain.yml</text>
  <text x="840" y="502" text-anchor="middle" fill="#fda4af" font-size="10">All quote responses</text>

  <!-- ─── NODE 6 : Trained Model ─── -->
  <g filter="url(#shadow)">
    <rect x="490" y="415" width="170" height="105" rx="14" fill="#1c1f2e"/>
  </g>
  <rect x="490" y="415" width="170" height="105" rx="14" fill="none" stroke="#ec4899" stroke-width="1.5"/>
  <text x="575" y="454" text-anchor="middle" font-size="28">🧠</text>
  <text x="575" y="479" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Trained Model</text>
  <text x="575" y="496" text-anchor="middle" fill="#f9a8d4" font-size="10">nlu.yml · stories.yml · rules.yml</text>
  <text x="575" y="510" text-anchor="middle" fill="#f9a8d4" font-size="10">(generated via rasa train)</text>

  <!-- Arrow Trained Model ↑ Rasa (dashed) -->
  <line x1="575" y1="415" x2="575" y2="362" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-dash)"/>
  <text x="558" y="393" text-anchor="middle" fill="#9ca3af" font-size="10">loads</text>
  <text x="558" y="405" text-anchor="middle" fill="#9ca3af" font-size="10">at startup</text>

  <!-- Return arrow Flask ← Rasa (curved) -->
  <path d="M 500 220 Q 410 130 430 197" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-dash)"/>
  <text x="448" y="145" text-anchor="middle" fill="#9ca3af" font-size="10">response</text>

  <!-- ─── Legend ─── -->
  <rect x="50" y="415" width="330" height="95" rx="10" fill="#0d1117" stroke="#374151" stroke-width="1"/>
  <text x="70" y="437" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="2">LEGEND</text>
  <line x1="70" y1="455" x2="110" y2="455" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="120" y="459" fill="#d1d5db" font-size="11">Live request / response flow</text>
  <line x1="70" y1="478" x2="110" y2="478" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-dash)"/>
  <text x="120" y="482" fill="#d1d5db" font-size="11">Model load / data reference</text>
  <line x1="70" y1="500" x2="110" y2="500" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="120" y="504" fill="#d1d5db" font-size="11">Data fetch</text>
</svg>
