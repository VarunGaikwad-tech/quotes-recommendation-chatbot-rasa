<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="900" height="600" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">PROJECT FLOW</text>
  <line x1="200" y1="54" x2="700" y2="54" stroke="#334155" stroke-width="1"/>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-yes" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-no" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Step helper: rounded rect nodes -->

  <!-- 1. User Opens Browser -->
  <rect x="330" y="70" width="240" height="52" rx="26" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">👤  User Opens Browser</text>
  <text x="450" y="114" text-anchor="middle" fill="#64748b" font-size="10">Navigates to 127.0.0.1:5000</text>

  <!-- Arrow -->
  <line x1="450" y1="122" x2="450" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Flask Serves UI -->
  <rect x="330" y="155" width="240" height="52" rx="26" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="184" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">🌐  Flask Serves UI</text>
  <text x="450" y="198" text-anchor="middle" fill="#64748b" font-size="10">index.html rendered in browser</text>

  <!-- Arrow -->
  <line x1="450" y1="207" x2="450" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. User Types Message -->
  <rect x="330" y="240" width="240" height="52" rx="26" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="450" y="269" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">💬  User Types Message</text>
  <text x="450" y="283" text-anchor="middle" fill="#64748b" font-size="10">e.g. "give me a motivation quote"</text>

  <!-- Arrow -->
  <line x1="450" y1="292" x2="450" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. POST to Rasa -->
  <rect x="330" y="325" width="240" height="52" rx="26" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="450" y="353" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="600">📡  POST to Rasa API</text>
  <text x="450" y="367" text-anchor="middle" fill="#64748b" font-size="10">/webhooks/rest/webhook</text>

  <!-- Arrow -->
  <line x1="450" y1="377" x2="450" y2="408" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5. Diamond: Intent Recognized? -->
  <polygon points="450,408 560,448 450,488 340,448" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="443" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="600">Intent</text>
  <text x="450" y="459" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="600">Recognized?</text>

  <!-- YES arrow → right → Quote Response -->
  <line x1="560" y1="448" x2="650" y2="448" stroke="#10b981" stroke-width="2" marker-end="url(#arr-yes)"/>
  <text x="605" y="440" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">YES</text>

  <!-- Quote Response box -->
  <rect x="650" y="420" width="200" height="56" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="750" y="447" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">✅  Return Quote</text>
  <text x="750" y="462" text-anchor="middle" fill="#64748b" font-size="10">Matched category response</text>
  <text x="750" y="474" text-anchor="middle" fill="#64748b" font-size="10">sent back to browser</text>

  <!-- NO arrow → left → Fallback -->
  <line x1="340" y1="448" x2="250" y2="448" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-no)"/>
  <text x="295" y="440" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">NO</text>

  <!-- Fallback box -->
  <rect x="50" y="420" width="200" height="56" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="150" y="447" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">⚠️  Fallback Response</text>
  <text x="150" y="462" text-anchor="middle" fill="#64748b" font-size="10">"Sorry, I didn't understand."</text>
  <text x="150" y="474" text-anchor="middle" fill="#64748b" font-size="10">Prompt user to retry</text>

  <!-- Both arrows lead down to "Display in Chat UI" -->
  <!-- From YES box -->
  <line x1="750" y1="476" x2="750" y2="540" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="750" y1="540" x2="510" y2="540" stroke="#64748b" stroke-width="1.5"/>
  <!-- From NO box -->
  <line x1="150" y1="476" x2="150" y2="540" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="150" y1="540" x2="390" y2="540" stroke="#64748b" stroke-width="1.5"/>
  <!-- Down to final box -->
  <line x1="450" y1="540" x2="450" y2="560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Final: Display in Chat UI -->
  <rect x="330" y="558" width="240" height="32" rx="16" fill="#334155" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="579" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">🖥️  Response Displayed in Chat</text>
</svg>
