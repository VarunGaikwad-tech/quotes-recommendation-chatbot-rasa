version: "3.1"

nlu:

- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - good morning
    - good evening
    - hey there

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you later
    - good night

- intent: motivation
  examples: |
    - give me motivation
    - motivational quote
    - motivate me
    - i need motivation
    - inspire me to work

- intent: inspiration
  examples: |
    - inspirational quote
    - give me inspiration
    - inspire me today
    - something inspiring

- intent: love
  examples: |
    - love quote
    - romantic quote
    - something about love
    - tell me a love quote

- intent: funny
  examples: |
    - funny quote
    - make me laugh
    - tell something funny
    - humor quote

- intent: success
  examples: |
    - success quote
    - quote about success
    - inspire me for success
    - how to succeed